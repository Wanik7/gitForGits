{{ define "admin_component" }}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - TechStore</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <!-- Мы используем header из base, но тут он не подключен по умолчанию, добавим простую шапку -->
    <header class="site-header">
        <div class="container">
            <h2 class="brand-logo"><a href="/" style="color: inherit;">TechStore Admin</a></h2>
            <nav class="nav-links">
                <a href="/" class="btn btn-outline">&larr; В магазин</a>
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <div style="margin-bottom: 2rem; display: flex; gap: 1rem; justify-content: center;">
            <a href="/admin/component" class="btn btn-primary">Управление товарами</a>
            <a href="/admin/user" class="btn btn-outline">Управление пользователями</a>
        </div>
        <div style="max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); border: 1px solid var(--border-color);">
            <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">Добавить новый товар</h2>
            <form action="/admin/component" method="POST" enctype="multipart/form-data" onsubmit="return prepareSpecs()">
                <div style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Название товара:</label>
                    <input type="text" name="name" class="form-input" required minlength="3">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Производитель:</label>
                    <input type="text" name="manufacturer" class="form-input" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Категория:</label>
                    <input type="text" name="category" class="form-input" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Цена ($):</label>
                        <input type="number" name="price" class="form-input" step="0.01" required>
                    </div>
                    <div>
                        <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Количество:</label>
                        <input type="number" name="stock" class="form-input" min="0" required>
                    </div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Описание товара:</label>
                    <textarea name="description" class="form-textarea" rows="4"></textarea>
                </div>
                <div style="margin-bottom: 2rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Изображение товара:</label>
                    <input type="file" name="image" class="form-input" accept="image/*" style="padding: 0.5rem;">
                    <small class="text-muted" style="display: block; margin-top: 0.5rem;">Оставьте пустым — будет использовано стандартное изображение</small>
                </div>

                <div style="margin-bottom: 2rem; padding: 1.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-color);">
                    <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">Характеристики товара</h3>
                    <div id="specs-container"></div>
                    <button type="button" class="btn btn-outline" style="width: 100%; border-style: dashed;" onclick="addSpecRow()">+ Добавить характеристику</button>
                    <input type="hidden" name="specs" id="specs-hidden">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Добавить на витрину</button>
            </form>
        </div>
    </main>

    <script>
        function addSpecRow() {
            const container = document.getElementById('specs-container');
            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '10px';
            row.style.marginBottom = '10px';

            row.innerHTML = `
                <input type="text" class="spec-key form-input" placeholder="Название (напр. Сокет)" style="flex: 1;">
                <input type="text" class="spec-val form-input" placeholder="Значение (напр. AM5)" style="flex: 1;">
                <button type="button" class="btn btn-outline" style="color: var(--danger); border-color: var(--danger);" onclick="this.parentElement.remove()">✕</button>
            `;
            container.appendChild(row);
        }

        window.onload = function() {
            addSpecRow();
        };

        function prepareSpecs() {
            const keys = document.querySelectorAll('.spec-key');
            const vals = document.querySelectorAll('.spec-val');
            let specsObj = {};
            for (let i = 0; i < keys.length; i++) {
                const key = keys[i].value.trim();
                const val = vals[i].value.trim();
                if (key !== '') specsObj[key] = val;
            }
            document.getElementById('specs-hidden').value = JSON.stringify(specsObj);
            return true;
        }
    </script>
</body>
</html>
{{ end }}
