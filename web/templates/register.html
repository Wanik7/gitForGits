{{ define "register" }}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - TechStore</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--auth-bg-gradient);
        }
        .auth-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }
        .auth-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.75rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
        }
        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="auth-title">Регистрация</h2>
        <form action="/register" method="POST">
            <div class="form-group">
                <label for="name" class="form-label">Имя:</label>
                <input type="text" id="name" name="name" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="email" class="form-label">Email:</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Пароль:</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Зарегистрироваться</button>
        </form>
        <div class="auth-footer">
            <p>Уже есть аккаунт? <a href="/login" style="font-weight: 600;">Войти</a></p>
            <p style="margin-top: 1rem;"><a href="/">&larr; Вернуться в магазин</a></p>
        </div>
    </div>
</body>
</html>
{{ end }}
