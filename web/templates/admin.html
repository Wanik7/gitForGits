<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>
    <h2>Добавить новый товар (Админка)</h2>
    <form action="/admin/component" method="POST" style="margin-bottom: 30px; border: 1px solid #ccc; padding: 15px; border-radius: 5px; max-width: 400px;">
        <div style="margin-bottom: 10px;">
            <label>Название товара:</label><br>
            <input type="text" name="name" required minlength="3" style="width: 100%;">
        </div>
        <div style="margin-bottom: 10px;">
            <label>Производитель:</label><br>
            <input type="text" name="manufacturer" required style="width: 100%;">
        </div>
        <div style="margin-bottom: 10px;">
            <label>Категория:</label><br>
            <input type="text" name="category" required style="width: 100%;">
        </div>
        <div style="margin-bottom: 10px;">
            <label>Цена ($):</label><br>
            <input type="number" name="price" step="0.01" required style="width: 100%;">
        </div>
        <button type="submit" style="background: green; color: white; padding: 10px 15px; border: none; cursor: pointer;">Добавить на витрину</button>
    </form>
</body>
