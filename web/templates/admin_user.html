{{ define "admin_user" }}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель: Пользователи - TechStore</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h2 class="brand-logo"><a href="/" style="color: inherit;">TechStore Admin</a></h2>
            <nav class="nav-links">
                <a href="/" class="btn btn-outline">&larr; В магазин</a>
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <div style="margin-bottom: 2rem; display: flex; gap: 1rem; justify-content: center;">
            <a href="/admin/component" class="btn btn-outline">Управление товарами</a>
            <a href="/admin/user" class="btn btn-primary">Управление пользователями</a>
        </div>
        <div style="max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); border: 1px solid var(--border-color);">
            <h2 style="margin-bottom: 2rem; font-size: 1.5rem;">Добавить пользователя</h2>
            
            {{if .Error}}
            <div style="padding: 1rem; margin-bottom: 1.5rem; border-radius: var(--radius-md); background: #fee2e2; color: #991b1b; border: 1px solid #f87171;">
                {{.Error}}
            </div>
            {{end}}

            <form action="/admin/user" method="POST">
                <div style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Имя:</label>
                    <input type="text" name="name" class="form-input" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email:</label>
                    <input type="email" name="email" class="form-input" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Пароль:</label>
                    <input type="password" name="password" class="form-input" required minlength="6">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label class="form-label" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Роль:</label>
                    <select name="role" class="form-input" required style="cursor: pointer; appearance: auto;">
                        <option value="customer">Покупатель (customer)</option>
                        <option value="moderator">Модератор (moderator)</option>
                        <option value="admin">Администратор (admin)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Создать пользователя</button>
            </form>
        </div>
    </main>
</body>
</html>
{{ end }}
